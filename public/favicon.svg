<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Monitor body -->
  <rect x="3" y="3" width="26" height="20" rx="3" ry="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <!-- Screen -->
  <rect x="5" y="5" width="22" height="16" rx="1" fill="#0d0d0d"/>
  <!-- Terminal cursor lines -->
  <rect x="7" y="8" width="8" height="1.5" rx="0.5" fill="#00e676"/>
  <rect x="7" y="11" width="12" height="1.5" rx="0.5" fill="#00e676" opacity="0.7"/>
  <rect x="7" y="14" width="6" height="1.5" rx="0.5" fill="#00e676" opacity="0.5"/>
  <!-- Cursor blink block -->
  <rect x="14" y="14" width="2" height="1.5" rx="0.2" fill="#00e676"/>
  <!-- Stand neck -->
  <rect x="14" y="23" width="4" height="3" fill="#2a2a2a"/>
  <!-- Stand base -->
  <rect x="10" y="26" width="12" height="2" rx="1" fill="#2a2a2a"/>
</svg>
